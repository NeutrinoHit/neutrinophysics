lang: en

format:
  revealjs:
    theme: [black, ../../shared/styles/neutrinohit-reveal.scss]
    css:
      - ../assets/css/custom.css
    logo: ../../shared/reveal/dvnlogo.png
    html-math-method: mathjax
    include-after-body:
      - text: |
          <script data-external="1" data-context-home="https://neutrinohit.github.io/en/education.html#solar-neutrino-masterclass" data-context-home-label="Solar neutrino masterclass map" src="../../shared/reveal/neutrinohit-reveal-footer.js"></script>
      - ../../analytics/cloudflare-web-analytics.html
    embed-resources: false
    slide-number: true
    slide-level: 2
    toc: true
    toc-depth: 1
    toc-title: "Lesson Map"
    transition: fade
    width: 1280
    height: 720
    margin: 0.06
    center: false
    incremental: false
    chalkboard: true
    preview-links: false

execute:
  echo: false
  warning: false
  message: false
