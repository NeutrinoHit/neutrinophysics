project:
  type: default
  render:
    - slides/*.qmd

lang: ru

format:
  revealjs:
    theme: [black, ../shared/styles/neutrinohit-reveal.scss]
    css:
      - assets/css/custom.css
    logo: ../shared/reveal/dvnlogo.png
    html-math-method: mathjax
    include-after-body:
      text: |
        <script data-external="1" data-context-home="../index.html" data-context-home-label="Мини-курс" src="../../shared/reveal/neutrinohit-reveal-footer.js"></script>
    footer: "Solar Neutrino Masterclass · Baikal School · D. Naumov"
    embed-resources: true
    slide-number: true
    slide-level: 2
    toc: true
    toc-depth: 1
    toc-title: "Карта занятия"
    transition: fade
    width: 1280
    height: 720
    margin: 0.06
    center: false
    incremental: false
    chalkboard: false
    preview-links: false

execute:
  echo: false
  warning: false
  message: false
