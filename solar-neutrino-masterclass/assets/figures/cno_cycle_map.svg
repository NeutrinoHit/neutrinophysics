<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1320 610" role="img" aria-labelledby="title desc">
  <title id="title">CNO cycle diagram</title>
  <desc id="desc">Stylized CNO-I cycle with carbon, nitrogen, and oxygen nuclei, proton captures, beta decays, gamma emission, and a small NO side branch.</desc>
  <defs>
    <radialGradient id="bgGlow" cx="48%" cy="50%" r="62%">
      <stop offset="0%" stop-color="#24384a" stop-opacity="0.92"/>
      <stop offset="62%" stop-color="#111820" stop-opacity="0.86"/>
      <stop offset="100%" stop-color="#05080c" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="proton" cx="34%" cy="28%" r="70%">
      <stop offset="0%" stop-color="#fff6f6"/>
      <stop offset="42%" stop-color="#ff747b"/>
      <stop offset="100%" stop-color="#c51f2b"/>
    </radialGradient>
    <radialGradient id="neutron" cx="34%" cy="28%" r="70%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="45%" stop-color="#c9c9c9"/>
      <stop offset="100%" stop-color="#565656"/>
    </radialGradient>
    <radialGradient id="electron" cx="34%" cy="28%" r="70%">
      <stop offset="0%" stop-color="#fff9ed"/>
      <stop offset="45%" stop-color="#ffd36e"/>
      <stop offset="100%" stop-color="#f08b1a"/>
    </radialGradient>
    <filter id="softShadow" x="-35%" y="-35%" width="170%" height="170%">
      <feDropShadow dx="0" dy="7" stdDeviation="7" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <marker id="captureArrow" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L14,7 L0,14 Z" fill="#8ec5ff"/>
    </marker>
    <marker id="betaArrow" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L14,7 L0,14 Z" fill="#ff9f7a"/>
    </marker>
    <marker id="alphaArrow" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L14,7 L0,14 Z" fill="#8fd19e"/>
    </marker>
    <style>
      .frame { fill: url(#bgGlow); stroke: rgba(255,255,255,.22); stroke-width: 2; }
      .ring { fill: none; stroke: rgba(142,197,255,.13); stroke-width: 2; stroke-dasharray: 10 14; }
      .main-arrow { fill: none; stroke-width: 7; stroke-linecap: round; stroke-linejoin: round; }
      .capture { stroke: #8ec5ff; marker-end: url(#captureArrow); }
      .beta { stroke: #ff9f7a; marker-end: url(#betaArrow); }
      .alpha { stroke: #8fd19e; marker-end: url(#alphaArrow); }
      .side { stroke-width: 5; opacity: .9; }
      .label { fill: #f3f7fb; font: 700 25px Arial, Helvetica, sans-serif; }
      .small { fill: #d7e2ef; font: 700 19px Arial, Helvetica, sans-serif; }
      .blue { fill: #8ec5ff; }
      .orange { fill: #ffbd8f; }
      .green { fill: #97dca5; }
      .nu { fill: #ff4a4a; }
      .nucleus-label { fill: #ffffff; font: 800 38px Arial, Helvetica, sans-serif; text-anchor: middle; dominant-baseline: central; }
      .nucleus-name { fill: #cfe4ff; font: 800 18px Arial, Helvetica, sans-serif; text-anchor: middle; }
      .title { fill: #ffffff; font: 900 34px Arial, Helvetica, sans-serif; letter-spacing: .02em; }
      .subtitle { fill: #d4dee9; font: 700 22px Arial, Helvetica, sans-serif; }
      .panel { fill: rgba(255,255,255,.06); stroke: rgba(255,255,255,.28); stroke-width: 2; }
      .panel-title { fill: #ffffff; font: 900 24px Arial, Helvetica, sans-serif; }
      .panel-text { fill: #d4dee9; font: 700 17px Arial, Helvetica, sans-serif; }
      .sup { font-size: 58%; baseline-shift: super; }
      .sub { font-size: 58%; baseline-shift: sub; }
    </style>
  </defs>

  <rect class="frame" x="18" y="18" width="1284" height="574" rx="24"/>
  <circle class="ring" cx="620" cy="310" r="230"/>
  <circle class="ring" cx="620" cy="310" r="178"/>

  <text class="title" x="62" y="72">CNO CYCLE</text>
  <text class="subtitle" x="62" y="104">catalytic hydrogen burning: C, N, O are recycled; beta decays emit neutrinos</text>

  <!-- Main cycle arrows -->
  <path class="main-arrow capture" d="M688 130 C790 147 854 202 876 286"/>
  <path class="main-arrow beta" d="M879 342 C853 421 790 474 701 492"/>
  <path class="main-arrow capture" d="M560 493 C467 472 405 417 383 333"/>
  <path class="main-arrow capture" d="M384 276 C410 195 470 144 554 128"/>
  <path class="main-arrow beta" d="M493 189 C545 204 581 237 601 275"/>
  <path class="main-arrow alpha" d="M620 250 C622 208 624 172 629 139"/>

  <!-- Reaction labels -->
  <text class="small blue" x="752" y="172">p, gamma</text>
  <text class="small orange" x="895" y="402">e<tspan class="sup">+</tspan> + <tspan class="nu">nu</tspan><tspan class="nu sub">e</tspan></text>
  <text class="small blue" x="456" y="488">p, gamma</text>
  <text class="small blue" x="333" y="250">p, gamma</text>
  <text class="small orange" x="484" y="244">e<tspan class="sup">+</tspan> + <tspan class="nu">nu</tspan><tspan class="nu sub">e</tspan></text>
  <text class="small green" x="646" y="213">p, alpha</text>

  <!-- Nucleus symbol template by repetition -->
  <g id="c12" transform="translate(620 104)" filter="url(#softShadow)">
    <circle cx="-34" cy="-18" r="21" fill="url(#proton)"/><circle cx="0" cy="-30" r="21" fill="url(#neutron)"/><circle cx="33" cy="-14" r="21" fill="url(#proton)"/>
    <circle cx="-24" cy="16" r="21" fill="url(#neutron)"/><circle cx="14" cy="20" r="21" fill="url(#proton)"/><circle cx="0" cy="-2" r="24" fill="url(#neutron)"/>
    <text class="nucleus-label" x="0" y="1"><tspan class="sup">12</tspan>C</text>
    <text class="nucleus-name" x="0" y="72">carbon seed</text>
  </g>

  <g transform="translate(906 314)" filter="url(#softShadow)">
    <circle cx="-34" cy="-18" r="21" fill="url(#proton)"/><circle cx="0" cy="-32" r="21" fill="url(#neutron)"/><circle cx="35" cy="-17" r="21" fill="url(#neutron)"/>
    <circle cx="-24" cy="18" r="21" fill="url(#neutron)"/><circle cx="16" cy="19" r="21" fill="url(#proton)"/><circle cx="1" cy="-1" r="25" fill="url(#proton)"/>
    <text class="nucleus-label" x="0" y="1"><tspan class="sup">13</tspan>N</text>
  </g>

  <g transform="translate(620 512)" filter="url(#softShadow)">
    <circle cx="-34" cy="-17" r="21" fill="url(#neutron)"/><circle cx="0" cy="-32" r="21" fill="url(#proton)"/><circle cx="35" cy="-16" r="21" fill="url(#neutron)"/>
    <circle cx="-25" cy="17" r="21" fill="url(#proton)"/><circle cx="17" cy="19" r="21" fill="url(#neutron)"/><circle cx="1" cy="-1" r="25" fill="url(#proton)"/>
    <text class="nucleus-label" x="0" y="1"><tspan class="sup">13</tspan>C</text>
  </g>

  <g transform="translate(348 314)" filter="url(#softShadow)">
    <circle cx="-36" cy="-18" r="21" fill="url(#proton)"/><circle cx="0" cy="-33" r="21" fill="url(#neutron)"/><circle cx="36" cy="-16" r="21" fill="url(#proton)"/>
    <circle cx="-26" cy="18" r="21" fill="url(#neutron)"/><circle cx="18" cy="20" r="21" fill="url(#proton)"/><circle cx="1" cy="-1" r="25" fill="url(#neutron)"/>
    <text class="nucleus-label" x="0" y="1"><tspan class="sup">14</tspan>N</text>
  </g>

  <g transform="translate(416 156)" filter="url(#softShadow)">
    <circle cx="-34" cy="-18" r="21" fill="url(#proton)"/><circle cx="0" cy="-32" r="21" fill="url(#proton)"/><circle cx="35" cy="-17" r="21" fill="url(#neutron)"/>
    <circle cx="-25" cy="17" r="21" fill="url(#neutron)"/><circle cx="17" cy="20" r="21" fill="url(#proton)"/><circle cx="0" cy="-1" r="25" fill="url(#proton)"/>
    <text class="nucleus-label" x="0" y="1"><tspan class="sup">15</tspan>O</text>
  </g>

  <g transform="translate(620 310)" filter="url(#softShadow)">
    <circle cx="-46" cy="-22" r="23" fill="url(#proton)"/><circle cx="-10" cy="-40" r="23" fill="url(#neutron)"/><circle cx="31" cy="-27" r="23" fill="url(#proton)"/>
    <circle cx="-32" cy="18" r="23" fill="url(#neutron)"/><circle cx="14" cy="27" r="23" fill="url(#proton)"/><circle cx="48" cy="5" r="23" fill="url(#neutron)"/>
    <circle cx="0" cy="0" r="29" fill="url(#neutron)"/>
    <text class="nucleus-label" x="0" y="1"><tspan class="sup">15</tspan>N</text>
  </g>

  <!-- Beta/neutrino/gamma decorative particles -->
  <circle cx="838" cy="430" r="13" fill="url(#electron)"/>
  <text class="label nu" x="875" y="453">nu<tspan class="sub">e</tspan></text>
  <circle cx="482" cy="230" r="13" fill="url(#electron)"/>
  <text class="label nu" x="432" y="218">nu<tspan class="sub">e</tspan></text>
  <g transform="translate(790 160)">
    <circle cx="0" cy="0" r="18" fill="#ffdb60"/><path d="M0 -25 L6 -7 L24 -14 L10 0 L24 14 L6 7 L0 25 L-6 7 L-24 14 L-10 0 L-24 -14 L-6 -7 Z" fill="#fff200" stroke="#f6a000" stroke-width="2"/>
  </g>
  <g transform="translate(410 460)">
    <circle cx="0" cy="0" r="18" fill="#ffdb60"/><path d="M0 -25 L6 -7 L24 -14 L10 0 L24 14 L6 7 L0 25 L-6 7 L-24 14 L-10 0 L-24 -14 L-6 -7 Z" fill="#fff200" stroke="#f6a000" stroke-width="2"/>
  </g>

  <!-- NO side branch -->
  <rect class="panel" x="982" y="185" width="270" height="230" rx="18"/>
  <text class="panel-title" x="1010" y="224">NO side branch</text>
  <text class="panel-text" x="1010" y="251">smaller branch, third beta-neutrino source</text>
  <path class="main-arrow side capture" d="M682 310 C790 306 890 292 982 268"/>

  <g transform="translate(1032 320)" filter="url(#softShadow)">
    <circle cx="-20" cy="-12" r="15" fill="url(#proton)"/><circle cx="0" cy="-21" r="15" fill="url(#neutron)"/><circle cx="22" cy="-10" r="15" fill="url(#proton)"/>
    <circle cx="-14" cy="13" r="15" fill="url(#neutron)"/><circle cx="11" cy="15" r="15" fill="url(#proton)"/><circle cx="1" cy="0" r="18" fill="url(#neutron)"/>
    <text class="nucleus-label" x="0" y="2" style="font-size:26px"><tspan class="sup">16</tspan>O</text>
  </g>
  <path class="main-arrow side capture" d="M1068 320 H1125"/>
  <g transform="translate(1160 320)" filter="url(#softShadow)">
    <circle cx="-20" cy="-12" r="15" fill="url(#proton)"/><circle cx="0" cy="-21" r="15" fill="url(#neutron)"/><circle cx="22" cy="-10" r="15" fill="url(#proton)"/>
    <circle cx="-14" cy="13" r="15" fill="url(#neutron)"/><circle cx="11" cy="15" r="15" fill="url(#proton)"/><circle cx="1" cy="0" r="18" fill="url(#proton)"/>
    <text class="nucleus-label" x="0" y="2" style="font-size:26px"><tspan class="sup">17</tspan>F</text>
  </g>
  <path class="main-arrow side beta" d="M1160 356 C1138 395 1088 407 1037 382"/>
  <text class="small orange" x="1110" y="390">e<tspan class="sup">+</tspan> + <tspan class="nu">nu</tspan><tspan class="nu sub">e</tspan></text>
  <text class="small green" x="1016" y="438">p, alpha to <tspan class="sup">14</tspan>N</text>
  <rect x="1010" y="395" width="210" height="34" rx="17" fill="rgba(255,204,138,.12)" stroke="rgba(255,204,138,.58)" stroke-width="1.5"/>
  <text class="panel-text" x="1032" y="418">catalysts are recycled</text>

  <!-- Legend -->
  <g transform="translate(74 510)">
    <circle cx="0" cy="0" r="17" fill="url(#proton)"/><text class="small" x="32" y="7">proton</text>
    <circle cx="132" cy="0" r="17" fill="url(#neutron)"/><text class="small" x="164" y="7">neutron</text>
    <circle cx="290" cy="0" r="11" fill="url(#electron)"/><text class="small" x="312" y="7">positron</text>
  </g>
</svg>
