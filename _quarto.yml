project:
  type: website
  output-dir: _site
  resources:
    - "assets/**"
    - "shared/reveal/**"
    - "introduction/**/*.html"
    - "introduction/**/assets/**"
    - "introduction/slides/**"
    - "solar-neutrino-masterclass/assets/**"
    - "solar-neutrino-masterclass/data/b8_spectrum.csv"
    - "solar-neutrino-masterclass/data/masterclass1/**"
    - "solar-neutrino-masterclass/data/masterclass2/**"
    - "solar-neutrino-masterclass/data/project/**"
  render:
    - "*.qmd"
    - "introduction/index.qmd"
    - "solar-neutrino-masterclass/index.qmd"
    - "solar-neutrino-masterclass/slides/00_solar_neutrino_physics.qmd"
    - "solar-neutrino-masterclass/slides/00_solar_neutrino_physics_appendix.qmd"
    - "solar-neutrino-masterclass/slides/01_solar_sources.qmd"
    - "solar-neutrino-masterclass/slides/02_msw_detector_statistics.qmd"
    - "solar-neutrino-masterclass/assignments/sk_integrated_project.qmd"
    - "!introduction/neutrino-interactions.qmd"
    - "!solar-neutrino-masterclass/slides/03_student_defense.qmd"
    - "!solar-neutrino-masterclass/assignments/defense_requirements.qmd"
    - "!solar-neutrino-masterclass/assignments/fit_recipes.qmd"
    - "!solar-neutrino-masterclass/notebooks/*.ipynb"
    - "!solar-neutrino-masterclass/report_template/*.qmd"

lang: ru-RU

website:
  title: "Физика нейтрино"
  site-url: "https://neutrinohit.github.io/neutrinophysics/"
  repo-url: "https://github.com/NeutrinoHit/neutrinophysics"
  navbar:
    left:
      - href: index.qmd
        text: Физика нейтрино
      - href: introduction/index.qmd
        text: Введение
      - href: solar-neutrino-masterclass/index.qmd
        text: Solar Neutrinos
      - href: https://neutrinohit.github.io/lectures.html
        text: Все лекции
  page-footer:
    left: "© NeutrinoHit"
    right: "Built with Quarto"

format:
  html:
    theme: cosmo
    css: styles.css
    toc: false
    page-layout: full
    include-after-body: analytics/cloudflare-web-analytics.html
