project:
  type: website
  output-dir: _site
  resources:
    - "assets/**"
    - "shared/reveal/**"
    - "introduction/**/*.html"
    - "introduction/**/assets/**"
    - "introduction/slides/**"
    - "solar-neutrino-masterclass/assets/**"
    - "solar-neutrino-masterclass/data/**"
    - "solar-neutrino-masterclass/notebooks/**"
    - "solar-neutrino-masterclass/report_template/references.bib"
    - "solar-neutrino-masterclass/requirements.txt"
    - "solar-neutrino-masterclass/environment.yml"
  render:
    - "*.qmd"
    - "introduction/index.qmd"
    - "solar-neutrino-masterclass/index.qmd"
    - "solar-neutrino-masterclass/slides/*.qmd"
    - "solar-neutrino-masterclass/assignments/*.qmd"
    - "!introduction/neutrino-interactions.qmd"
    - "!solar-neutrino-masterclass/report_template/*.qmd"

lang: ru-RU

website:
  title: "Физика нейтрино"
  site-url: "https://neutrinohit.github.io/neutrinophysics/"
  repo-url: "https://github.com/NeutrinoHit/neutrinophysics"
  navbar:
    left:
      - href: index.qmd
        text: Физика нейтрино
      - href: introduction/index.qmd
        text: Введение
      - href: solar-neutrino-masterclass/index.qmd
        text: Solar Neutrinos
      - href: https://neutrinohit.github.io/lectures.html
        text: Все лекции
  page-footer:
    left: "© NeutrinoHit"
    right: "Built with Quarto"

format:
  html:
    theme: cosmo
    css: styles.css
    toc: false
    page-layout: full
    include-after-body: analytics/cloudflare-web-analytics.html
